<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>15 de Bianca Farina</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #080810;
      --white: #f0eeff;
      --muted: #7070a0;
      --border: rgba(160, 140, 255, 0.15);
      --pink: #ff6eb4;
      --cyan: #4de8ff;
      --purple: #b06cff;
      --gold: #ffe066;
    }

    body {
      background: var(--bg);
      font-family: 'DM Sans', sans-serif;
      color: var(--white);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* DESTELLOS */
    .sparkles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .spark {
      position: absolute;
      border-radius: 50%;
      animation: sparkle linear infinite;
      opacity: 0;
    }

    @keyframes sparkle {
      0%   { opacity: 0; transform: scale(0) rotate(0deg); }
      20%  { opacity: 1; }
      80%  { opacity: 1; }
      100% { opacity: 0; transform: scale(1.5) rotate(180deg); }
    }

    /* LAYOUT */
    .page-layout {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr;
      min-height: 100vh;
    }

    @media (min-width: 860px) {
      .page-layout {
        grid-template-columns: 400px 1fr;
      }

      .left-panel {
        position: sticky;
        top: 0;
        height: 100vh;
        overflow-y: auto;
        border-right: 0.5px solid var(--border);
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding: 40px 36px;
      }

      .right-panel {
        padding: 40px 40px 60px;
        overflow-y: auto;
      }
    }

    /* DISCO BALL */
    .disco-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 28px;
    }

    .disco-ball {
      animation: sway 4s ease-in-out infinite;
      transform-origin: top center;
      filter: drop-shadow(0 0 18px rgba(180, 140, 255, 0.5));
    }

    @keyframes sway {
      0%, 100% { transform: rotate(-4deg); }
      50%       { transform: rotate(4deg); }
    }

    /* HERO */
    .hero {
      text-align: center;
      padding: 50px 20px 24px;
    }

    @media (min-width: 860px) {
      .hero {
        padding: 0 0 28px;
      }
    }

    .hero-eyebrow {
      font-size: 10px;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--pink);
      margin-bottom: 10px;
      font-weight: 400;
    }

    .hero-name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(52px, 9vw, 80px);
      line-height: 0.95;
      font-weight: 700;
      background: linear-gradient(135deg, var(--pink) 0%, var(--purple) 40%, var(--cyan) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-name em {
      display: block;
      font-style: italic;
      font-weight: 400;
    }

    .hero-sub {
      font-size: 15px;
      color: var(--muted);
      margin-top: 12px;
      font-weight: 300;
      letter-spacing: 0.03em;
    }

    .hero-divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--purple), transparent);
      margin: 20px auto 0;
    }

    /* UPLOAD */
    .upload-section {
      max-width: 560px;
      margin: 0 auto;
      padding: 0 20px;
    }

    @media (min-width: 860px) {
      .upload-section {
        max-width: 100%;
        padding: 0;
        margin: 0;
      }
    }

    .section-label {
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--purple);
      font-weight: 500;
      text-align: center;
      margin-bottom: 20px;
    }

    .name-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    .name-row label {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      font-weight: 300;
      letter-spacing: 0.05em;
    }

    .name-row input {
      flex: 1;
      background: rgba(255, 255, 255, 0.04);
      border: 0.5px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 300;
      outline: none;
      transition: border-color 0.2s;
    }

    .name-row input:focus { border-color: var(--purple); }
    .name-row input.error { border-color: var(--pink); }
    .name-row input::placeholder { color: rgba(240, 238, 255, 0.2); }

    .drop-zone {
      border: 0.5px solid var(--border);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.02);
      min-height: 160px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .drop-zone:hover,
    .drop-zone.drag-over {
      border-color: var(--pink);
      background: rgba(255, 110, 180, 0.04);
    }

    .drop-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      padding: 28px;
    }

    .drop-text {
      font-size: 13px;
      color: var(--muted);
      font-weight: 300;
      text-align: center;
      line-height: 1.6;
    }

    .drop-text strong {
      color: var(--pink);
      font-weight: 400;
    }

    .file-btns {
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }

    .file-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 0.5px solid var(--border);
      border-radius: 20px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 400;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      white-space: nowrap;
    }

    .file-btn:hover {
      border-color: var(--pink);
      background: rgba(255, 110, 180, 0.08);
    }

    #preview {
      display: none;
      width: 100%;
      max-height: 260px;
      object-fit: cover;
      border-radius: 13px;
    }

    .progress-wrap {
      display: none;
      height: 2px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 2px;
      margin-top: 12px;
      overflow: hidden;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--pink), var(--cyan));
      transition: width 0.3s;
    }

    .upload-btn {
      margin-top: 14px;
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, rgba(255, 110, 180, 0.15), rgba(77, 232, 255, 0.1));
      border: 0.5px solid rgba(255, 110, 180, 0.4);
      border-radius: 10px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
    }

    .upload-btn:hover {
      background: linear-gradient(135deg, rgba(255, 110, 180, 0.25), rgba(77, 232, 255, 0.18));
      border-color: var(--pink);
    }

    .upload-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .status-msg {
      text-align: center;
      font-size: 13px;
      min-height: 20px;
      margin-top: 10px;
      font-weight: 300;
    }

    .status-msg.success { color: var(--cyan); }
    .status-msg.error   { color: var(--pink); }
    .status-msg.info    { color: var(--purple); }

    /* DIVIDER */
    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      max-width: 560px;
      margin: 44px auto 28px;
      padding: 0 20px;
    }

    @media (min-width: 860px) {
      .divider {
        max-width: 100%;
        padding: 0;
        margin: 0 0 24px;
      }
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 0.5px;
      background: linear-gradient(90deg, transparent, rgba(176, 108, 255, 0.3), transparent);
    }

    .divider-text {
      font-size: 10px;
      color: var(--purple);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .photo-counter {
      font-size: 11px;
      color: var(--muted);
    }

    /* GALLERY */
    .gallery-grid {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px;
      columns: 2;
      column-gap: 10px;
    }

    @media (min-width: 600px)  { .gallery-grid { columns: 3; } }
    @media (min-width: 860px)  { .gallery-grid { max-width: 100%; padding: 0; columns: 3; } }
    @media (min-width: 1100px) { .gallery-grid { columns: 4; } }

    .photo-item {
      break-inside: avoid;
      margin-bottom: 10px;
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
    }

    .photo-item img {
      width: 100%;
      display: block;
      transition: transform 0.4s ease;
      border-radius: 10px;
    }

    .photo-item:hover img {
      transform: scale(1.04);
    }

    .photo-item::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 10px;
      border: 0.5px solid rgba(255, 110, 180, 0);
      transition: border-color 0.3s;
    }

    .photo-item:hover::after {
      border-color: rgba(255, 110, 180, 0.4);
    }

    .photo-author {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 24px 10px 8px;
      background: linear-gradient(transparent, rgba(8, 8, 16, 0.75));
      font-size: 11px;
      color: rgba(240, 238, 255, 0.7);
      font-weight: 300;
      opacity: 0;
      transition: opacity 0.3s;
      border-radius: 0 0 10px 10px;
    }

    .photo-item:hover .photo-author {
      opacity: 1;
    }

    .gallery-empty {
      column-span: all;
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 300;
      font-family: 'Playfair Display', serif;
      font-style: italic;
    }

    /* LIGHTBOX */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(8, 8, 16, 0.95);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .lightbox.open {
      display: flex;
    }

    .lightbox img {
      max-width: 100%;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 6px;
      user-select: none;
    }

    .lightbox-close {
      position: fixed;
      top: 20px;
      right: 24px;
      background: none;
      border: none;
      color: rgba(240, 238, 255, 0.4);
      font-size: 32px;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
      z-index: 10;
    }

    .lightbox-close:hover {
      color: var(--white);
    }

    .lightbox-nav {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.06);
      border: 0.5px solid rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: rgba(240, 238, 255, 0.6);
      transition: background 0.2s, color 0.2s;
      z-index: 10;
    }

    .lightbox-nav:hover {
      background: rgba(255, 110, 180, 0.2);
      color: var(--white);
    }

    .lightbox-prev { left: 16px; }
    .lightbox-next { right: 16px; }

    .lightbox-counter {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: rgba(240, 238, 255, 0.35);
      letter-spacing: 0.1em;
    }
  </style>
</head>

                  <rect x="3" y="3" width="18" height="18" rx="2"/>
                  <circle cx="8.5" cy="8.5" r="1.5"/>
                  <polyline points="21 15 16 10 5 21"/>
                </svg>
                Desde galería
              </button>
            </div>
          </div>
          <img id="preview" src="" alt="preview">
          <input type="file" id="fileInputCamera" style="display: none;">
          <input type="file" id="fileInputGallery" accept="image/*" style="display: none;">
        </div>
        <div class="progress-wrap" id="progressWrap">
          <div class="progress-bar" id="progressBar"></div>
        </div>
        <button class="upload-btn" id="uploadBtn">Compartir foto</button>
        <p class="status-msg" id="statusMsg"></p>
      </section>

    </div>

    <div class="right-panel">
      <div class="divider">
        <span class="divider-text">Galería de la noche</span>
        <span class="photo-counter"><span id="photoCount">0</span> fotos</span>
      </div>
      <div class="gallery-grid" id="gallery">
        <p class="gallery-empty">Las fotos de la noche aparecerán aquí</p>
      </div>
    </div>

  </div>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" onclick="closeLightbox()">×</button>
    <button class="lightbox-nav lightbox-prev" onclick="lightboxNav(-1)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="15 18 9 12 15 6"/>
      </svg>
    </button>
    <img id="lightboxImg" src="" alt="foto">
    <button class="lightbox-nav lightbox-next" onclick="lightboxNav(1)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>
    <span class="lightbox-counter" id="lightboxCounter"></span>
  </div>

  <script>
    // ── Destellos animados ──────────────────────────────────────
    const sparklesEl = document.getElementById('sparkles');
    const sparkColors = ['#ff6eb4', '#4de8ff', '#b06cff', '#ffe066', '#ffffff'];

    for (let i = 0; i < 40; i++) {
      const s = document.createElement('div');
      s.className = 'spark';
      const size = Math.random() * 5 + 2;
      s.style.cssText = `
        width: ${size}px;
        height: ${size}px;
        left: ${Math.random() * 100}%;
        top: ${Math.random() * 100}%;
        background: ${sparkColors[Math.floor(Math.random() * sparkColors.length)]};
        animation-duration: ${Math.random() * 4 + 2}s;
        animation-delay: ${Math.random() * 5}s;
      `;
      sparklesEl.appendChild(s);
    }

    // ── Supabase ────────────────────────────────────────────────
    const SUPABASE_URL = 'https://wbnjfkygwmyaoertyyef.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_aDHyXLdWVK4FRhZrNp8_6A_wugpB2gs';
    const BUCKET = 'FOTOS';

    const { createClient } = supabase;
    const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

    // ── Referencias al DOM ──────────────────────────────────────
    const dropZone        = document.getElementById('dropZone');
    const fileInputCamera = document.getElementById('fileInputCamera');
    const fileInputGallery = document.getElementById('fileInputGallery');
    const uploadBtn       = document.getElementById('uploadBtn');
    const progressBar     = document.getElementById('progressBar');
    const progressWrap    = document.getElementById('progressWrap');
    const statusMsg       = document.getElementById('statusMsg');
    const nameInput       = document.getElementById('nameInput');
    const gallery         = document.getElementById('gallery');
    const countEl         = document.getElementById('photoCount');
    const previewEl       = document.getElementById('preview');

    let selectedFile = null;

    // ── Helpers ─────────────────────────────────────────────────
    function setStatus(msg, type) {
      statusMsg.textContent = msg;
      statusMsg.className = 'status-msg ' + type;
    }

    function showPreview(file) {
      selectedFile = file;
      const reader = new FileReader();
      reader.onload = (e) => {
        previewEl.src = e.target.result;
        previewEl.style.display = 'block';
        dropZone.querySelector('.drop-label').style.display = 'none';
      };
      reader.readAsDataURL(file);
    }

    // ── Eventos de archivo ──────────────────────────────────────
    nameInput.addEventListener('input', () => nameInput.classList.remove('error'));

    document.getElementById('btnCamera').addEventListener('click', (e) => {
      e.stopPropagation();
      fileInputCamera.click();
    });

    document.getElementById('btnGallery').addEventListener('click', (e) => {
      e.stopPropagation();
      fileInputGallery.click();
    });

    dropZone.addEventListener('click', () => fileInputGallery.click());

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('drag-over');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      if (e.dataTransfer.files[0]) showPreview(e.dataTransfer.files[0]);
    });

    fileInputCamera.addEventListener('change', () => {
      if (fileInputCamera.files[0]) showPreview(fileInputCamera.files[0]);
    });

    fileInputGallery.addEventListener('change', () => {
      if (fileInputGallery.files[0]) showPreview(fileInputGallery.files[0]);
    });

    // ── Subir foto ──────────────────────────────────────────────
    uploadBtn.addEventListener('click', async () => {
      if (!selectedFile) {
        setStatus('Elegí una foto primero.', 'error');
        return;
      }
      if (!selectedFile.type.startsWith('image/')) {
        setStatus('Solo se pueden subir imágenes.', 'error');
        return;
      }

      const nombre = nameInput.value.trim();
      if (!nombre) {
        setStatus('Escribí tu nombre antes de subir.', 'error');
        nameInput.focus();
        nameInput.classList.add('error');
        return;
      }
      nameInput.classList.remove('error');

      const ext = selectedFile.name.split('.').pop();
      const filename = Date.now() + '_' + Math.random().toString(36).slice(2) + '.' + ext;

      uploadBtn.disabled = true;
      progressWrap.style.display = 'block';
      progressBar.style.width = '30%';
      setStatus('Subiendo foto...', 'info');

      const { error: uploadError } = await sb.storage
        .from(BUCKET)
        .upload(filename, selectedFile, { cacheControl: '3600', upsert: false });

      if (uploadError) {
        setStatus('Error al subir: ' + uploadError.message, 'error');
        progressWrap.style.display = 'none';
        uploadBtn.disabled = false;
        return;
      }

      progressBar.style.width = '70%';

      const { data: urlData } = sb.storage.from(BUCKET).getPublicUrl(filename);
      const url = urlData.publicUrl;

      const { error: dbError } = await sb.from('FOTOS').insert({
        url,
        nombre,
        filename,
        created_at: new Date().toISOString()
      });

      progressBar.style.width = '100%';
      setTimeout(() => {
        progressWrap.style.display = 'none';
        progressBar.style.width = '0%';
      }, 500);

      if (dbError) {
        setStatus('Error al registrar: ' + dbError.message, 'error');
      } else {
        setStatus('¡Foto subida!', 'success');
        setTimeout(() => setStatus('', ''), 3000);
        selectedFile = null;
        fileInputCamera.value = '';
        fileInputGallery.value = '';
        previewEl.style.display = 'none';
        dropZone.querySelector('.drop-label').style.display = 'flex';
      }

      uploadBtn.disabled = false;
    });

    // ── Galería ─────────────────────────────────────────────────
    let photoUrls = [];
    let currentPhotoIndex = 0;

    async function loadPhotos() {
      const { data } = await sb.from('FOTOS').select('*').order('created_at', { ascending: false });
      if (!data) return;

      countEl.textContent = data.length;
      photoUrls = data.map((f) => f.url);

      if (data.length === 0) {
        gallery.innerHTML = '<p class="gallery-empty">Las fotos de la noche aparecerán aquí</p>';
        return;
      }

      gallery.innerHTML = data.map((f, i) => `
        <div class="photo-item" onclick="openLightbox(${i})">
          <img src="${f.url}" loading="lazy" alt="Foto de ${f.nombre}">
          <span class="photo-author">${f.nombre}</span>
        </div>
      `).join('');
    }

    sb.channel('fotos-live')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'fotos' }, () => loadPhotos())
      .subscribe();

    loadPhotos();

    // ── Lightbox ────────────────────────────────────────────────
    document.getElementById('lightbox').addEventListener('click', (e) => {
      if (e.target.id === 'lightbox') closeLightbox();
    });

    function openLightbox(index) {
      currentPhotoIndex = index;
      document.getElementById('lightboxImg').src = photoUrls[index];
      document.getElementById('lightboxCounter').textContent = (index + 1) + ' / ' + photoUrls.length;
      document.getElementById('lightbox').classList.add('open');
    }

    function lightboxNav(dir) {
      currentPhotoIndex = (currentPhotoIndex + dir + photoUrls.length) % photoUrls.length;
      document.getElementById('lightboxImg').src = photoUrls[currentPhotoIndex];
      document.getElementById('lightboxCounter').textContent = (currentPhotoIndex + 1) + ' / ' + photoUrls.length;
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
    }

    document.addEventListener('keydown', (e) => {
      if (!document.getElementById('lightbox').classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') lightboxNav(-1);
      if (e.key === 'ArrowRight') lightboxNav(1);
    });

    // Swipe en celular
    let touchStartX = 0;
    document.getElementById('lightbox').addEventListener('touchstart', (e) => {
      touchStartX = e.touches[0].clientX;
    });
    document.getElementById('lightbox').addEventListener('touchend', (e) => {
      const diff = touchStartX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 50) lightboxNav(diff > 0 ? 1 : -1);
    });
  </script>

</body>
</html>
